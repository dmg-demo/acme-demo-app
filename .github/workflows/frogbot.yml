name: "Frogbot Security Scan"

on:
  pull_request_target: 
    types: [opened, synchronize]
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  actions: read
  id-token: write
  pull-requests: write
  contents: write
  security-events: write

jobs:
  frogbot-scan:
    runs-on: ubuntu-latest
    environment: frogbot
    strategy:
      matrix:
        branch: ["main"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Pre-install shared-libs into local Maven cache
        run: mvn install -f shared-libs/pom.xml -DskipTests -B

      - uses: jfrog/frogbot@v2
        with:
          oidc-provider-name: github-acme
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          JF_PROJECT: acme-storefront
          JF_UPLOAD_PR_SECURITY_RESULTS_TO_VCS: "true"
          JF_PR_ADD_SUCCESS_COMMENT: "true"
          JF_FAIL: "false"

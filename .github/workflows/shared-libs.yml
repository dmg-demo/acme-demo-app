name: shared-libs build & release bundle

on:
  push:
    branches: [main]
    paths: ['shared-libs/**', '.github/workflows/shared-libs.yml']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (else uses pom.xml)'
        required: false

env:
  JF_URL: ${{ vars.JF_URL }}              # https://dylanmo.jfrog.io
  JF_PROJECT: acme-storefront
  RB_NAME: shared-libs-RB
  SIGNING_KEY: ${{ vars.RB_SIGNING_KEY }} # GPG key name configured in the platform

jobs:
  build-and-bundle:
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    defaults: { run: { working-directory: shared-libs } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_URL }}
          JF_PROJECT: ${{ env.JF_PROJECT }}
        with:
          oidc-provider-name: github-acme   # configure in JFrog Platform → OIDC

      - name: Configure Maven via jf cli
        run: jf mvn-config --repo-resolve-releases mvn-virtual --repo-deploy-releases shared-libs-mvn-rel-local

      - name: Resolve version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          [ -z "$V" ] && V=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          echo "version=$V" >>"$GITHUB_OUTPUT"

      - name: Build, deploy & publish build-info
        run: |
          jf mvn clean deploy -DskipTests \
            --build-name=shared-libs --build-number=${{ github.run_number }}
          jf rt bce shared-libs ${{ github.run_number }}
          jf rt bp  shared-libs ${{ github.run_number }}

      - name: Create Release Bundle v2
        run: |
          jf release-bundle-create "$RB_NAME" "${{ steps.ver.outputs.version }}" \
            --builds="shared-libs/${{ github.run_number }}" \
            --signing-key="$SIGNING_KEY" \
            --project="$JF_PROJECT"

      - name: Attach release notes evidence (stub)
        run: |
          jf evd create \
            --release-bundle="$RB_NAME" \
            --release-bundle-version="${{ steps.ver.outputs.version }}" \
            --predicate=./release-notes.md \
            --predicate-type=https://acme.dev/release-notes/v1 \
            --key="$SIGNING_KEY" \
            --project="$JF_PROJECT"

name: shared-libs build & release bundle

on:
  push:
    branches: [main]
    paths: ['shared-libs/**', '.github/workflows/shared-libs.yml']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (else uses pom.xml)'
        required: false

env:
  JF_URL: ${{ vars.JF_URL }}              # https://dylanmo.jfrog.io
  JF_PROJECT: acme-storefront
  RB_NAME: shared-libs-RB
  SIGNING_KEY: ${{ vars.RB_SIGNING_KEY }} # GPG key name configured in the platform

jobs:
  build-and-bundle:
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    defaults: { run: { working-directory: shared-libs } }
    steps:
      - uses: jfrog/boost@v0
        with:
          accept_terms: yes
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_URL }}
          JF_PROJECT: ${{ env.JF_PROJECT }}
        with:
          oidc-provider-name: github-acme   # configure in JFrog Platform → OIDC

      - name: Configure Maven via jf cli
        run: |
          jf mvn-config \
            --repo-resolve-releases mvn-virtual \
            --repo-resolve-snapshots mvn-virtual \
            --repo-deploy-releases shared-libs-mvn-rel-local \
            --repo-deploy-snapshots shared-libs-mvn-rel-local

      - name: Resolve version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            V=$(awk '
              /<artifactId>shared-libs<\/artifactId>/ { found=1; next }
              found && /<version>/ {
                sub(/.*<version>/, ""); sub(/<\/version>.*/, ""); print; exit
              }
            ' pom.xml)
          fi
          [ -z "$V" ] && { echo "ERROR: could not resolve version from pom.xml" >&2; exit 1; }
          echo "Resolved version: $V"
          echo "version=$V" >>"$GITHUB_OUTPUT"

      - name: Build, deploy & publish build-info
        run: |
          jf mvn clean deploy -DskipTests \
            --build-name=shared-libs --build-number=${{ github.run_number }}
          jf rt bce shared-libs ${{ github.run_number }}
          jf rt bp  shared-libs ${{ github.run_number }}

      - name: Create Release Bundle v2
        run: |
          echo '{"builds":[{"name":"shared-libs","number":"${{ github.run_number }}","project":"acme-storefront"}]}' > /tmp/builds.json
          jf release-bundle-create "$RB_NAME" "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --builds=/tmp/builds.json \
            --signing-key="$SIGNING_KEY" \
            --project="$JF_PROJECT"

      - name: Record latest RB version
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh variable set SHARED_LIBS_RB_VERSION \
            --body "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --repo "${{ github.repository }}"

      - name: Attach release notes evidence (stub)
        env:
          EVIDENCE_SIGNING_KEY: ${{ secrets.EVIDENCE_SIGNING_KEY }}
        run: |
          echo "$EVIDENCE_SIGNING_KEY" > /tmp/acme-evidence.key
          jq -Rs '{content: .}' ./release-notes.md > /tmp/predicate.json
          jf evd create \
            --release-bundle="$RB_NAME" \
            --release-bundle-version="${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --predicate=/tmp/predicate.json \
            --predicate-type=https://acme.dev/release-notes/v1 \
            --key=/tmp/acme-evidence.key \
            --project="$JF_PROJECT"

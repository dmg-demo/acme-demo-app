name: storefront parent release bundle

# Manually triggered. Assembles a nested RBv2 from existing child RB versions.
# This is metadata-only — no compilation. Runs in seconds.

on:
  workflow_dispatch:
    inputs:
      storefront_version:
        description: 'Parent Acme-Storefront-RB version (e.g. 1.0.0)'
        required: true
      shared_libs_version:
        description: 'shared-libs-RB version (blank = latest from vars.SHARED_LIBS_RB_VERSION)'
        required: false
      api_version:
        description: 'service-api-RB version (blank = latest from vars.API_RB_VERSION)'
        required: false
      payments_version:
        description: 'service-payments-RB version (blank = latest from vars.PAYMENTS_RB_VERSION)'
        required: false
      frontend_version:
        description: 'service-frontend-RB version (blank = latest from vars.FRONTEND_RB_VERSION)'
        required: false
      promote_to:
        description: 'Optional: promote on success (DEV/QA/PROD or blank)'
        required: false
        default: ''

env:
  JF_URL: ${{ vars.JF_URL }}
  JF_PROJECT: acme-storefront
  PARENT_RB: Acme-Storefront-RB
  SIGNING_KEY: ${{ vars.RB_SIGNING_KEY }}

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    steps:
      - uses: jfrog/boost@v0
        with:
          accept_terms: yes
      - uses: actions/checkout@v4

      - uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_URL }}
          JF_PROJECT: ${{ env.JF_PROJECT }}
        with:
          oidc-provider-name: github-acme

      - name: Resolve bundle versions
        id: versions
        run: |
          SHARED="${{ github.event.inputs.shared_libs_version }}"
          [ -z "$SHARED" ] && SHARED="${{ vars.SHARED_LIBS_RB_VERSION }}"
          API="${{ github.event.inputs.api_version }}"
          [ -z "$API" ] && API="${{ vars.API_RB_VERSION }}"
          PAYMENTS="${{ github.event.inputs.payments_version }}"
          [ -z "$PAYMENTS" ] && PAYMENTS="${{ vars.PAYMENTS_RB_VERSION }}"
          FRONTEND="${{ github.event.inputs.frontend_version }}"
          [ -z "$FRONTEND" ] && FRONTEND="${{ vars.FRONTEND_RB_VERSION }}"
          echo "shared=$SHARED" >> "$GITHUB_OUTPUT"
          echo "api=$API" >> "$GITHUB_OUTPUT"
          echo "payments=$PAYMENTS" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"

      - name: Assemble parent release bundle from children
        run: |
          jf release-bundle-create "$PARENT_RB" "${{ github.event.inputs.storefront_version }}" \
            --source-type-release-bundles="name=shared-libs-RB, version=${{ steps.versions.outputs.shared }}; name=service-api-RB, version=${{ steps.versions.outputs.api }}; name=service-payments-RB, version=${{ steps.versions.outputs.payments }}; name=service-frontend-RB, version=${{ steps.versions.outputs.frontend }}" \
            --signing-key="$SIGNING_KEY" \
            --project="$JF_PROJECT"

      - name: Attach rolled-up release notes evidence to parent
        env:
          EVIDENCE_SIGNING_KEY: ${{ secrets.EVIDENCE_SIGNING_KEY }}
        run: |
          echo "$EVIDENCE_SIGNING_KEY" > /tmp/acme-evidence.key

          # Structured JSON predicate (machine-readable; used by policy checks and GraphQL)
          jq -n \
            --arg version  "${{ github.event.inputs.storefront_version }}" \
            --arg date     "$(date -u +%Y-%m-%d)" \
            --arg shared   "${{ steps.versions.outputs.shared }}" \
            --arg api      "${{ steps.versions.outputs.api }}" \
            --arg payments "${{ steps.versions.outputs.payments }}" \
            --arg frontend "${{ steps.versions.outputs.frontend }}" \
            '{
              storefront_version: $version,
              release_date: $date,
              components: [
                { name: "shared-libs",      release_bundle: "shared-libs-RB",      version: $shared },
                { name: "service-api",      release_bundle: "service-api-RB",      version: $api },
                { name: "service-payments", release_bundle: "service-payments-RB", version: $payments },
                { name: "service-frontend", release_bundle: "service-frontend-RB", version: $frontend }
              ]
            }' > /tmp/predicate.json

          # Human-readable markdown (rendered in the JFrog platform evidence viewer)
          {
            printf "# Acme Storefront ${{ github.event.inputs.storefront_version }} — Release Notes\n\n"
            printf "**Release Date:** $(date -u +%Y-%m-%d)\n\n"
            printf "---\n\n"
            printf "## Components\n\n"
            printf "| Component | Release Bundle | Version |\n"
            printf "|-----------|---------------|----------|\n"
            printf "| shared-libs | shared-libs-RB | ${{ steps.versions.outputs.shared }} |\n"
            printf "| service-api | service-api-RB | ${{ steps.versions.outputs.api }} |\n"
            printf "| service-payments | service-payments-RB | ${{ steps.versions.outputs.payments }} |\n"
            printf "| service-frontend | service-frontend-RB | ${{ steps.versions.outputs.frontend }} |\n\n"
            printf "---\n\n"
            cat shared-libs/release-notes.md
            printf "\n\n---\n\n"
            cat service-api/release-notes.md
            printf "\n\n---\n\n"
            cat service-payments/release-notes.md
            printf "\n\n---\n\n"
            cat service-frontend/release-notes.md
          } > /tmp/release-notes.md

          jf evd create \
            --release-bundle="$PARENT_RB" \
            --release-bundle-version="${{ github.event.inputs.storefront_version }}" \
            --predicate=/tmp/predicate.json \
            --predicate-type=https://acme.dev/release-notes-rollup/v1 \
            --markdown=/tmp/release-notes.md \
            --key=/tmp/acme-evidence.key \
            --key-alias=acme-evidence \
            --project="$JF_PROJECT"

      - name: Promote (optional)
        if: ${{ github.event.inputs.promote_to != '' }}
        run: |
          jf release-bundle-promote "$PARENT_RB" \
            "${{ github.event.inputs.storefront_version }}" \
            "${{ github.event.inputs.promote_to }}" \
            --signing-key="$SIGNING_KEY" \
            --project="$JF_PROJECT"

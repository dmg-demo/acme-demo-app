name: service-frontend build & release bundle

on:
  push:
    branches: [main]
    paths: ['service-frontend/**', '.github/workflows/frontend.yml']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (else uses VERSION file)'
        required: false

env:
  JF_URL: ${{ vars.JF_URL }}
  JF_PROJECT: acme-storefront
  RB_NAME: service-frontend-RB
  IMAGE_REPO: frontend-docker-rel-local
  SIGNING_KEY: ${{ vars.RB_SIGNING_KEY }}
  AT_APP_KEY: acme-service-frontend

jobs:
  build-and-bundle:
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read, security-events: write }
    defaults: { run: { working-directory: service-frontend } }
    steps:
      - uses: jfrog/boost@v0
        with:
          accept_terms: yes
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_URL }}
          JF_PROJECT: ${{ env.JF_PROJECT }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          oidc-provider-name: github-acme

      - name: Resolve version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          [ -z "$V" ] && V=$(cat VERSION)
          echo "version=$V" >>"$GITHUB_OUTPUT"

      - name: Docker login
        run: jf docker login "${{ vars.JF_HOST }}"

      - name: Build & push Docker image
        run: |
          IMG="${{ vars.JF_HOST }}/$IMAGE_REPO/service-frontend:${{ steps.ver.outputs.version }}"
          jf docker build -t "$IMG" .
          jf docker scan "$IMG"
          jf docker push "$IMG" \
            --build-name=service-frontend --build-number=${{ github.run_number }}
          jf rt bce service-frontend ${{ github.run_number }}
          jf rt bp  service-frontend ${{ github.run_number }} --project="$JF_PROJECT"

      - name: Scan build
        run: jf build-scan service-frontend ${{ github.run_number }} --project="$JF_PROJECT"

      - name: Create Release Bundle v2
        run: |
          echo '{"builds":[{"name":"service-frontend","number":"${{ github.run_number }}","project":"acme-storefront"}]}' > /tmp/builds.json
          jf release-bundle-create "$RB_NAME" "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --builds=/tmp/builds.json \
            --signing-key="$SIGNING_KEY" \
            --project="$JF_PROJECT"

      - name: Record latest RB version
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh variable set FRONTEND_RB_VERSION \
            --body "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --repo "${{ github.repository }}"

      - name: Attach release notes evidence
        env:
          EVIDENCE_SIGNING_KEY: ${{ secrets.EVIDENCE_SIGNING_KEY }}
        run: |
          echo "$EVIDENCE_SIGNING_KEY" > /tmp/acme-evidence.key
          jq -n \
            --arg version "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --arg date "$(date -u +%Y-%m-%d)" \
            '{ version: $version, build_date: $date }' > /tmp/predicate.json
          jf evd create \
            --release-bundle="$RB_NAME" \
            --release-bundle-version="${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --predicate=/tmp/predicate.json \
            --predicate-type=https://acme.dev/release-notes/v1 \
            --markdown=./release-notes.md \
            --key=/tmp/acme-evidence.key \
            --key-alias=acme-evidence \
            --project="$JF_PROJECT"
          jf evd create \
            --build-name=service-frontend \
            --build-number=${{ github.run_number }} \
            --predicate=/tmp/predicate.json \
            --predicate-type=https://acme.dev/release-notes/v1 \
            --markdown=./release-notes.md \
            --key=/tmp/acme-evidence.key \
            --key-alias=acme-evidence \
            --project="$JF_PROJECT"

      - name: Register AppTrust application version
        run: |
          jf apptrust version-create "$AT_APP_KEY" \
            "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --source-type-builds \
              "name=service-frontend, id=${{ github.run_number }}, project-key=$JF_PROJECT" \
            --tag "$RB_NAME"

          jf apptrust version-promote "$AT_APP_KEY" \
            "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            DEV \
            --sync=true

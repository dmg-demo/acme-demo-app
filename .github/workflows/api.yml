name: service-api build & release bundle

on:
  push:
    branches: [main]
    paths: ['service-api/**', '.github/workflows/api.yml']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (else uses pom.xml)'
        required: false

env:
  JF_URL: ${{ vars.JF_URL }}
  JF_PROJECT: acme-storefront
  RB_NAME: service-api-RB
  IMAGE_REPO: api-docker-rel-local
  SIGNING_KEY: ${{ vars.RB_SIGNING_KEY }}
  AT_APP_KEY: acme-service-api

jobs:
  build-and-bundle:
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read, security-events: write }
    defaults: { run: { working-directory: service-api } }
    steps:
      - uses: jfrog/boost@v0
        with:
          accept_terms: yes
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: docker/setup-buildx-action@v3

      - uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_URL }}
          JF_PROJECT: ${{ env.JF_PROJECT }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          oidc-provider-name: github-acme

      - name: Configure Maven via jf cli
        run: |
          jf mvn-config \
            --repo-resolve-releases mvn-virtual \
            --repo-resolve-snapshots mvn-virtual \
            --repo-deploy-releases api-mvn-rel-local \
            --repo-deploy-snapshots api-mvn-rel-local

      - name: Curation Audit
        run: jf ca

      - name: Resolve version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            V=$(awk '
              /<artifactId>service-api<\/artifactId>/ { found=1; next }
              found && /<version>/ {
                sub(/.*<version>/, ""); sub(/<\/version>.*/, ""); print; exit
              }
            ' pom.xml)
          fi
          [ -z "$V" ] && { echo "ERROR: could not resolve version from pom.xml" >&2; exit 1; }
          echo "Resolved version: $V"
          echo "version=$V" >>"$GITHUB_OUTPUT"

      - name: Build jar & publish build-info (maven)
        run: |
          jf mvn clean package -DskipTests \
            --build-name=service-api --build-number=${{ github.run_number }}

      - name: Docker login
        run: jf docker login "${{ vars.JF_HOST }}"

      - name: Build & push Docker image, capture build-info
        run: |
          IMG="${{ vars.JF_HOST }}/$IMAGE_REPO/service-api:${{ steps.ver.outputs.version }}"
          jf docker build -t "$IMG" .
          jf docker scan "$IMG"
          jf docker push "$IMG" \
            --build-name=service-api --build-number=${{ github.run_number }}
          jf rt bce service-api ${{ github.run_number }}
          jf rt bp  service-api ${{ github.run_number }} --project="$JF_PROJECT"

      - name: Scan build
        run: jf build-scan service-api ${{ github.run_number }} --project="$JF_PROJECT"

      - name: Create Release Bundle v2
        run: |
          echo '{"builds":[{"name":"service-api","number":"${{ github.run_number }}","project":"acme-storefront"}]}' > /tmp/builds.json
          jf release-bundle-create "$RB_NAME" "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --builds=/tmp/builds.json \
            --signing-key="$SIGNING_KEY" \
            --project="$JF_PROJECT"

      - name: Record latest RB version
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh variable set API_RB_VERSION \
            --body "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --repo "${{ github.repository }}"

      - name: Attach release notes evidence
        env:
          EVIDENCE_SIGNING_KEY: ${{ secrets.EVIDENCE_SIGNING_KEY }}
        run: |
          echo "$EVIDENCE_SIGNING_KEY" > /tmp/acme-evidence.key
          jq -n \
            --arg version "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --arg date "$(date -u +%Y-%m-%d)" \
            '{ version: $version, build_date: $date }' > /tmp/predicate.json
          jf evd create \
            --release-bundle="$RB_NAME" \
            --release-bundle-version="${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --predicate=/tmp/predicate.json \
            --predicate-type=https://acme.dev/release-notes/v1 \
            --markdown=./release-notes.md \
            --key=/tmp/acme-evidence.key \
            --key-alias=acme-evidence \
            --project="$JF_PROJECT"

      - name: Register AppTrust application version
        run: |
          jf apptrust version-create "$AT_APP_KEY" \
            "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            --source-type-builds \
              "name=service-api, id=${{ github.run_number }}" \
            --tag "$RB_NAME"

          jf apptrust version-promote "$AT_APP_KEY" \
            "${{ steps.ver.outputs.version }}-${{ github.run_number }}" \
            DEV \
            --sync true

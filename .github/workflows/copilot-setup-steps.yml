name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Validate JFrog MCP inputs
        env:
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_MCP_URL: ${{ vars.JF_MCP_URL }}
        run: |
          if [ -z "$JF_ACCESS_TOKEN" ]; then
            echo "::error::Missing secret JF_ACCESS_TOKEN."
            exit 1
          fi

          if [ -z "$JF_MCP_URL" ]; then
            JF_MCP_URL="https://dylanmo.jfrog.io/mcp"
          fi

          echo "Using JFrog MCP URL: $JF_MCP_URL"
          curl -fsS -H "Authorization: Bearer $JF_ACCESS_TOKEN" "$JF_MCP_URL" >/dev/null

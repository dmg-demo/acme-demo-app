# ─────────────────────────────────────────────────────────────────────────────
# CVE-2024-34750 Hardening — service-payments
#
# JFrog Xray finding : CVSS 7.5 High
# Root cause         : HTTP/2 stream state not fully cleaned up on error,
#                      allowing remote unauthenticated DoS via stream exhaustion.
# Remediation-guide  : jfrog/remediation-guide → CVE-2024-34750 / Java/Spring Boot
# ─────────────────────────────────────────────────────────────────────────────

# ── Primary mitigation: disable HTTP/2 to eliminate the attack surface entirely.
# For a payments service, HTTP/2 is not required — keeping this disabled is
# the safest posture and the strongest hardening measure.
server.http2.enabled=false

# ── Connection-level resource limits (defence-in-depth for both HTTP/1.1 and 2)
server.tomcat.connection-timeout=20000
server.tomcat.max-connections=8192
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.keep-alive-timeout=20000
server.tomcat.max-keep-alive-requests=100

# ── Reject oversized requests before they hit the servlet layer
server.tomcat.max-swallow-size=2MB
server.tomcat.max-http-response-header-size=8KB
